spring.application.name=kosmo163_boot
server.port=80

# JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ------ DB 정보
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/FREE
spring.datasource.username=CNS
spring.datasource.password=CNS


# 1. 카멜케이스 설정 (기존 설정 유지)
mybatis.configuration.map-underscore-to-camel-case=true

# 2. 별칭(Type Aliases) 설정 (XML 대신 여기서 처리)
# 해당 패키지 아래의 모든 클래스를 클래스명으로 별칭 등록해줍니다.
mybatis.type-aliases-package=com.gguek.app




